<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página no Chrome</title>
    <style>
        /* Estilos básicos para deixar a página bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #4285F4; /* Azul padrão do Google */
        }
        p {
            font-size: 16px;
            line-height: 1.5;
        }
        .botao {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .botao:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, Sejam bem vindos a minha pagina!</h1>
        <p>Produções de Ocimar e curriculo.</p>
        <a href="https://sites.google.com/view/manual-de-geometria-sagrada/in%C3%ADcio" class="botao">Bem vindo a esta nova experiencia</a>
    </div>

</body>
</html>
